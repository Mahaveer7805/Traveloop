{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 3rem auto;">
    <h1 class="page-title">Profile Settings</h1>
    
    <form method="POST" action="{{ url_for('profile') }}" style="margin-top: 2rem;">
        <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" value="{{ user.name }}" required>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" value="{{ user.email }}" required>
        </div>
        
        <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #e2e8f0;">
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem;">Member since {{ user.created_at.strftime('%B %Y') }}</p>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
