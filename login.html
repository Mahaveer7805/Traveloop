{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 4rem auto; text-align: center;">
    <h1 class="page-title">Welcome Back</h1>
    <p class="page-subtitle">Log in to manage your travel plans</p>

    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group" style="text-align: left;">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="name@example.com">
        </div>
        
        <div class="form-group" style="text-align: left;">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
    </form>
    
    <p style="margin-top: 2rem; color: var(--text-secondary);">
        Don't have an account? <a href="{{ url_for('signup') }}" style="color: var(--accent-color); text-decoration: none;">Sign Up</a>
    </p>
</div>
{% endblock %}
